<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
  <link href="https://fonts.googleapis.com/css?family=Lato:100,100i,300,300i,400,400i,700,700i,900,900i'"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Abel" rel="stylesheet">
  <style>
  /* contents */
  #contents{text-align: center;}
  #contents > div{height: 100vh; line-height: 100vh;}
  #contents > div#section2{line-height: 1;position: relative;}
  #contents > div#section3{line-height: 1;position: relative;}
  #contents > div h2{
    font-size: 90px; font-weight: 200; text-transform: uppercase;
  }

  #contents > div h2 strong{
    font-weight: 700; font-style: italic;
  }

  /* section */
  #section1{background: radial-gradient(ellipse farthest-corner at center top, #cbf49a, #1ea623);}
  /*background: radial-gradient(모양 크기 at 중심점, 색상지정점1, 색상지정점2, ...);*/
  #section2{
  background:radial-gradient(ellipse farthest-corner at center top,#f39264 0%, #f2606f 100%);}  
  #section3{
  background:radial-gradient(ellipse farthest-corner at center top, #ffee75, #ff8930);}
  #section4{
  background:radial-gradient(ellipse farthest-corner at center top, #6CEBCF 0%, #38a7aa 100%);}
  #section5{
  background:radial-gradient(ellipse farthest-corner at center bottom, #6beace, #2e9aa4);}
  #section6{
  background:radial-gradient(ellipse farthest-corner at center bottom, #69d2fb 0%, #20438E 100%);}
 
  /* reset */
  *{margin:0; padding:0; font-family: 'Lato';}
  li{list-style: none;}
  a{text-decoration: none;}

#bar{
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%,-50%);
  width: 50%;
}

#bar .skillbar{
  width: 100%;
  height: 40px;
  background-color: #fff;
  margin: 5px 0;
  position: relative; 
}

.skillbar .skill_title{
  position: absolute;
  top: 0;
  left: 0;
  width: 110px;
  height: 40px;
  text-align: center;
  line-height: 40px;
  z-index: 5;
}

.skillbar .skill_percent{
  position: absolute;
  top: 0;
  right: 0;
  height: 40px;
  padding-right: 20px;
  line-height: 40px;
  z-index: 5;
}

.skillbar .skill_bar{
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 40px;
  background-color: orange;
}


  </style>
</head>
<body>
  <div id="contents">
    <div id="section1">
      <h2 id="text">안녕하세요 웹개발자 <strong>박은실입니다.</strong></h2>
    </div>

    <div id="section2">
      <div id="bar">
        <div class="skillbar" data-percent="85">
          <div class="skill_title">HTML5</div>
          <div class="skill_bar"></div>
          <div class="skill_percent Count">85</div>
        </div>
        <div class="skillbar" data-percent="98">
          <div class="skill_title">CSS3</div>
          <div class="skill_bar"></div>
          <div class="skill_percent Count">98</div>
        </div>
        <div class="skillbar" data-percent="87">
          <div class="skill_title">jQuery</div>
          <div class="skill_bar"></div>
          <div class="skill_percent Count">87</div>
        </div>
        <div class="skillbar" data-percent="98">
          <div class="skill_title">Photoshop</div>
          <div class="skill_bar"></div>
          <div class="skill_percent Count">98</div>
        </div>
        <div class="skillbar" data-percent="100">
          <div class="skill_title">Illustrator</div>
          <div class="skill_bar"></div>
          <div class="skill_percent Count">100</div>
        </div>
      </div>
    </div>

    <div id="section3">
      <h2>여기는 section3입니다.</h2>
    </div>

    <div id="section4">
      <h2>삶이 있는 한 <strong>희망</strong>은 있다.</h2>
    </div>

    <div id="section5">
      <h2>먼저핀 꽃은 <strong>먼저진다.</strong></h2>
    </div>

    <div id="section6">
      <h2>내일은 내일의 <strong>태양이 뜬다.</strong></h2>
    </div>

  </div>
</body>
<script>
  $(function () {
    $(window).scroll(function () {
      var sct = $(this).scrollTop();
      console.log(sct);
      var off = $("#section2").offset().top;

      if (sct > off) {
        graph();
      }

    });
    function graph() {
      $(".skillbar").each(function () {
        $(this).find('.skill_bar').animate({
          'width': $(this).attr('data-percent') + "%"
        }, 5000);
      });
      if ($(".skillbar").hasClass('on') == false) {
        $('.Count').each(function () {
          var t = $(this);

            duration: 5000,
            progress: function () {
              var now = this.percent;
              t.text(Math.ceil(this.Counter));
            }
          });
        });
         $('.skillbar').addClass('on');
      }

    }

    let count = 0;
    let text1 = $('#text');
    let msg; //내용
    let comp; //글자길이
    let kkk;

    function main() {
      msg = text1.text(); //글자 내용을 msg에 저장
      comp = msg.length; //글자의 갯수
      tatata();

    }
    function tatata() {
      if (count <= comp) {
        kkk = msg.substring(0, count);
        //index 0 부터 count 직전 인덱스까지
        text1.text(kkk); //잘라낸 문자를 text1에 반영

        count++;
        setTimeout(tatata, 100); //재귀함수 호출
      } else {
        count = 0;
        main();
      }
    }

    main();
  });



</script>
</html>
