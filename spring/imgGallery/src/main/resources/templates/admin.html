<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>관리자 — imgGallery</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.35rem; }
        .msg { color: #0a6; margin: 0.75rem 0; }
        .err { color: #c00; margin: 0.75rem 0; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; margin: 1.5rem 0; padding: 1rem; background: #f4f4f4; border-radius: 8px; }
        label { font-weight: 600; font-size: 0.9rem; }
        button, .link-btn { cursor: pointer; padding: 0.45rem 0.85rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border-bottom: 1px solid #ddd; padding: 0.5rem; text-align: left; font-size: 0.9rem; }
        th { background: #f9f9f9; }
        .thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 4px; }
        nav { margin-bottom: 1rem; }
        a { color: #06c; }
        form.inline { display: inline; }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/gallery}">공개 갤러리</a>
    · <span sec:authentication="name">admin</span>
    ·
    <form class="inline" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">로그아웃</button>
    </form>
</nav>
<h1>이미지 관리</h1>
<p th:if="${msg}" class="msg" th:text="${msg}"></p>
<p th:if="${err}" class="err" th:text="${err}"></p>

<div class="toolbar">
    <form th:action="@{/admin/upload}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label for="file">이미지 업로드</label><br/>
        <input type="file" id="file" name="file" accept="image/*" required/>
        <button type="submit" style="margin-top:0.5rem;">업로드</button>
    </form>
</div>

<table th:if="${!images.isEmpty()}">
    <thead>
    <tr>
        <th>미리보기</th>
        <th>원본 파일명</th>
        <th>등록</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="img : ${images}">
        <td><img class="thumb" th:src="@{/files/{id}(id=${img.id})}" alt=""/></td>
        <td th:text="${img.originalFilename}">name</td>
        <td th:text="${#temporals.format(T(java.time.ZonedDateTime).ofInstant(img.createdAt, T(java.time.ZoneId).systemDefault()), 'yyyy-MM-dd HH:mm')}">date</td>
        <td>
            <form class="inline" th:action="@{/admin/delete/{id}(id=${img.id})}" method="post" onsubmit="return confirm('삭제할까요?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<p th:if="${images.isEmpty()}" style="color:#666;">등록된 이미지가 없습니다.</p>
</body>
</html>
