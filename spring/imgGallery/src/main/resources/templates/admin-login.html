<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>관리자 로그인 — imgGallery</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 4rem auto; padding: 0 1rem; }
        h1 { font-size: 1.25rem; }
        label { display: block; margin-top: 1rem; font-weight: 600; }
        input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
        button { margin-top: 1.25rem; padding: 0.5rem 1rem; cursor: pointer; }
        .err { color: #c00; margin-bottom: 1rem; }
        nav { margin-top: 1.5rem; }
        a { color: #06c; }
    </style>
</head>
<body>
<h1>관리자 로그인</h1>
<p th:if="${param.error}" class="err">아이디 또는 비밀번호가 올바르지 않습니다.</p>
<form th:action="@{/admin/perform-login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <label for="username">아이디</label>
    <input type="text" id="username" name="username" autocomplete="username" required/>
    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required/>
    <button type="submit">로그인</button>
</form>
<nav><a th:href="@{/gallery}">갤러리로</a></nav>
</body>
</html>
