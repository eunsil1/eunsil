<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>이미지 갤러리</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 1.5rem; background: #fafafa; }
        header { max-width: 1100px; margin: 0 auto 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
        h1 { font-size: 1.5rem; margin: 0; }
        a { color: #06c; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
        figure { margin: 0; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        figure img { width: 100%; height: 200px; object-fit: cover; display: block; }
        figcaption { padding: 0.5rem 0.65rem; font-size: 0.8rem; color: #555; word-break: break-all; }
        .empty { max-width: 1100px; margin: 2rem auto; text-align: center; color: #666; }
    </style>
</head>
<body>
<header>
    <h1>이미지 갤러리</h1>
    <nav><a th:href="@{/admin/login}">관리자</a></nav>
</header>
<p th:if="${images.isEmpty()}" class="empty">등록된 이미지가 없습니다.</p>
<div class="grid" th:if="${!images.isEmpty()}">
    <figure th:each="img : ${images}">
        <img th:src="@{/files/{id}(id=${img.id})}" th:alt="${img.originalFilename}" loading="lazy"/>
        <figcaption th:text="${img.originalFilename}">파일명</figcaption>
    </figure>
</div>
</body>
</html>
