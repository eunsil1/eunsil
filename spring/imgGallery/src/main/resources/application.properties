spring.application.name=imgGallery
server.port=8090

# MySQL — 스키마·행은 DB에 영구 저장 (로컬 MySQL 필요)
spring.datasource.url=jdbc:mysql://localhost:3306/img_gallery?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# 이미지 파일 본문 — 하드(디스크) 저장 경로 (DB에는 파일명·메타만 저장)
app.upload-dir=${user.home}/imgGallery-uploads/

app.admin.username=admin
app.admin.password=admin123