spring:
  application:
    name: board-login-img-security-Oauth

  datasource:
    url: jdbc:mysql://localhost:3306/board_login_img_security_oauth?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 422882629232-8pon9f90bifqlt0qlhe4p2ng7jf9qgnj.apps.googleusercontent.com
            client-secret: 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
            scope:
              - openid
              - profile
              - email
          naver:
            provider: naver
            client-id: anRBo1M8psCb4SJXFISI
            client-secret: K7O1w4r86O
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
          kakao:
            provider: kakao
            client-id: 7e3ea811040be56df471ac895856a9dd
            client-secret: iAh6cYzixzkgUeC881r8wCwZJ6NbnoHs
            client-name: Kakao
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
