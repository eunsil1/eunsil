# ── DB (MySQL) ────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/boarddb?serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

# ── JPA ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── 파일 업로드 (작업형 3) ──────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
file.upload-dir=uploads

# ── OAuth2 Google (작업형 4) ─────────────────────────────
# 환경 변수로 주입: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:none}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:none}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# OAuth2 로그인 성공 후 React 리다이렉트 URL
app.frontend-url=http://localhost:5173

# ── 서버 ──────────────────────────────────────────────────
server.port=8080
