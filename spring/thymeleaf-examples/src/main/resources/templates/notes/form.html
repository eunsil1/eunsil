<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{layouts/fragments :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layouts/fragments :: nav}"></nav>
<main class="container py-4">
    <h1 class="h4 mb-3" th:text="${pageTitle}">메모 작성</h1>
    <form th:action="@{/notes}" th:object="${noteForm}" method="post" class="card card-body shadow-sm">
        <div class="mb-3">
            <label class="form-label" for="title">제목</label>
            <input id="title" type="text" class="form-control" th:classappend="${#fields.hasErrors('title')} ? ' is-invalid'" th:field="*{title}">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">오류</div>
<!--            th:classappend="${#fields.hasErrors('title')} - 조건부 스타일링 is-invalid 부트스트랩이 빨간 테두리  -->
        </div>
        <div class="mb-3">
            <label class="form-label" for="content">내용</label>
            <textarea id="content" class="form-control" rows="6" th:classappend="${#fields.hasErrors('content')} ? ' is-invalid'" th:field="*{content}"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">오류</div>
        </div>
        <button type="submit" class="btn btn-primary">저장</button>
        <a class="btn btn-link" th:href="@{/notes}">목록</a>
    </form>
</main>
<footer th:replace="~{layouts/fragments :: footer}"></footer>
</body>
</html>
