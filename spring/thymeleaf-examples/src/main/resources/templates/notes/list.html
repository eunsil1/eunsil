<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{layouts/fragments :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layouts/fragments :: nav}"></nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="${pageTitle}">메모 목록</h1>
        <a class="btn btn-primary btn-sm" th:href="@{/notes/new}">새 메모</a>
    </div>
    <p class="text-muted small">데이터: H2 파일 DB · 조회: <code>NoteRepository</code> → <code>NoteService</code> → <code>NoteController</code></p>
    <div th:if="${#lists.isEmpty(notes)}" class="alert alert-secondary">메모가 없습니다.</div>
    <table class="table table-hover bg-white shadow-sm rounded overflow-hidden" th:unless="${#lists.isEmpty(notes)}">
        <thead class="table-light">
        <tr>
            <th style="width:6rem">#</th>
            <th>제목</th>
            <th style="width:12rem">작성일시</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="n : ${notes}">
            <td th:text="${n.id}">1</td>
            <td><a th:href="@{/notes/{id}(id=${n.id})}" th:text="${n.title}">제목</a></td>
            <td class="text-muted small" th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</td>
        </tr>
        </tbody>
    </table>
    <p class="mt-3"><a th:href="@{/}">← 홈</a></p>
</main>
<footer th:replace="~{layouts/fragments :: footer}"></footer>
</body>
</html>
