<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{layouts/fragments :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layouts/fragments :: nav}"></nav>
<main class="container py-4">
    <h1 class="h4 mb-3" th:text="${pageTitle}">메모 작성</h1>
    <article class="card shadow">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold" th:text="${note.title}">제목</span>
            <small class="text-muted" th:text="${#temporals.format(note.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</small>
        </div>
        <div class="card-body">
            <p class="mb-0 text-break" th:text="${note.content}"
               style="white-space: pre-wrap">내용</p>
        </div>
        <div class="card-footer d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/notes}">목록</a>
            <a class="btn btn-outline-primary btn-sm" th:href="@{/notes/{id}/edit(id=${note.id})}">수정</a>
            <form th:action="@{/notes/{id}/delete(id=${note.id})}" method="post" class="d-inline"
                  onsubmit="return confirm('삭제할까요?');">
                <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
            </form>
        </div>


    </article>
</main>
<footer th:replace="~{layouts/fragments :: footer}"></footer>
</body>
</html>
