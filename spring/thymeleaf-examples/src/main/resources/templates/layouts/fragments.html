<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} ?: 'Thymeleaf 예제'">Thymeleaf 예제</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<!--th:fragment="nav" 구역이름이 nav -->
    <th:block th:fragment="nav">
<!--  th:replace= 이자리를 ~{layouts/header :: siteHeader}로 교체      -->
        <div th:replace="~{layouts/header :: siteHeader}"></div>
    </th:block>
    <th:block th:fragment="footer">
        <div th:replace="~{layouts/footer :: siteFooter}"></div>
    </th:block>
</body>
</html>
