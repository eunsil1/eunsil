<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{layouts/fragments :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layouts/fragments :: nav}"></nav>
<main class="container py-4">
    <h1 class="h3 mb-3" th:text="${pageTitle}">제목</h1>
    <section class="card mb-3">
        <div class="card-header"><code>th:text</code> - HTML 이스케이프(태그가 글자로 보임)</div>
        <div class="card-body">
            <p th:text="${withTag}">기본값</p>
        </div>
    </section>

    <section class="card mb-3">
        <div class="card-header"><code>th:utext</code> - 이스케이프 안함</div>
        <div class="card-body">
            <p th:utext="${withTag}">기본값</p>
        </div>
    </section>

    <section class="card">
        <div class="card-header">인라인 <code>[[...]]</code> / <code>[(...)])</code></div>
        <div class="card-body" th:inline="text">
            <p>텍스트: [[${plain}]]</p>
            <p>비이스케이프(주의): [(${withTag})]</p>
        </div>
    </section>
    <p class="mt-3"><a th:href="@{/}">← 홈</a></p>


</main>
<footer th:replace="~{layouts/fragments :: footer}"></footer>
</body>
</html>
