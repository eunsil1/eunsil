<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{layouts/fragments :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layouts/fragments :: nav}"></nav>
<main class="container py-4">
    <h1 class="h3 mb-3" th:text="${pageTitle}">제목</h1>
    <p class="text-muted small">행 데이터: <code>DemoItem</code> 엔티티 ·
        <code>DemoItemRepository</code> → <code>DemoItemService</code> → <code>DemoController</code> (테이블 <code>demo_items</code>)</p>
    <table class="table table-striped table-borderd bg-white shadow-sm">
        <thead>
            <tr>
                <th>#</th>
                <th>이름</th>
                <th>수량</th>
                <th>첫/마지막</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="it, stat : ${items}">
                <td th:text="${it.id}">1</td>
                <td th:text="${it.name}">이름</td>
                <td th:text="${it.qty}">0</td>
                <td>
<!--                    stat 상태변수 stat.index 인덱스 번호-->
                    <span th:if="${stat.first}" class="badge text-bg-primary">첫</span>
                    <span th:if="${stat.last}" class="badge text-bg-secondary">끝</span>
                    <span class="text-muted small" th:text="|${stat.index + 1} / ${stat.size}|">1/1</span>
                </td>
            </tr>
        </tbody>
    </table>
<!--    숫자 자동 생성기-->
    <ul class="list-unstyled">
        <li th:each="n : ${#numbers.sequence(1, 3)}" th:text="${n}">1</li>
    </ul>
    <p class="mt-3"><a th:href="@{/}">← 홈</a></p>
</main>
<footer th:replace="~{layouts/fragments :: footer}"></footer>
</body>
</html>
