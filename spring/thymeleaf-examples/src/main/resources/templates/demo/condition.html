<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{layouts/fragments :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layouts/fragments :: nav}"></nav>
<main class="container py-4">
    <h1 class="h3 mb-3" th:text="${pageTitle}">제목</h1>
    <p class="text-muted small">쿼리스트림으로 역할 바꿔 보기: <a th:href="@{/demo/condition(role='admin')}">admin</a>,
        <a th:href="@{/demo/condition(role='guest')}">guest</a></p>
    <div class="alert alert-info" th:if="${role == 'admin'}">관리자 화면입니다.</div>
    <div class="alert alert-secondary" th:unless="${role =='admin'}">게스트 화면입니다.</div>
    <div th:switch="${role}">
        <p th:case="'admin'" class="text-success">switch: admin</p>
        <p th:case="'guest'" class="text-muted">switch: guest</p>
        <p th:case="*" class="text-warning">switch: 기타</p>
    </div>
    <p th:if="${count > 0}"><span th:text="${count}">0</span>건이 있습니다. </p>
    <p class="mt-3"><a th:href="@{/}">← 홈</a></p>
</main>
<footer th:replace="~{layouts/fragments :: footer}"></footer>
</body>
</html>
