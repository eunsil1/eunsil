<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{layouts/fragments :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layouts/fragments :: nav}"></nav>
<main class="container py-4">
    <h1 class="h4 mb-3" th:text="${pageTitle}">제목</h1>
    <form th:action="@{/demo/form}" th:object="${demoForm}" method="post" class="card card-body shadow-sm">
        <div class="mb-3">
            <label class="form-label" for="username">사용자 이름</label>
            <input id="username" type="text" class="form-control" th:field="*{username}" placeholder="입력">
<!--            th:field="*{username} id="username" name="username"-->
        </div>
        <div class="mb-3">
            <label class="form-label" for="memo">메모</label>
            <textarea id="memo" class="form-control" rows="3" th:field="*{memo}"></textarea>
        </div>
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="agree" th:field="*{agree}">
            <label class="form-check-label" for="agree">동의</label>
        </div>
        <button type="submit" class="btn btn-primary">전송</button>
        <a class="btn btn-link" th:href="@{/static}">취소</a>
    </form>
    <p class="mt-3"><a th:href="@{/static}">← 홈</a></p>
</main>
<footer th:replace="~{layouts/fragments :: footer}"></footer>
</body>
</html>
