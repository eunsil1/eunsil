<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.25rem; line-height: 1.35; }
        .meta { color: #666; font-size: 0.9rem; margin: 0.5rem 0 1rem; }
        pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; line-height: 1.5; margin: 0; }
        .nav { margin-bottom: 1rem; font-size: 0.95rem; }
        a { color: #06c; }
        .err { color: #c00; margin: 0.75rem 0; }
        .actions { margin-top: 1.25rem; }
        button { cursor: pointer; padding: 0.35rem 0.75rem; }
        .gallery { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.25rem; }
        .shot { border: 1px solid #eee; border-radius: 6px; padding: 0.5rem; }
        .shot p { font-size: 0.75rem; color: #666; margin: 0 0 0.35rem; }
    </style>

</head>
<body>
<div class="nav">
    <a th:href="@{/posts}">목록</a>
    <span th:if="${session.loginUser != null}">· <a th:href="@{/posts/write}">글쓰기</a></span>
</div>
<p th:if="${error}" class="err" th:text="${error}"></p>
<h1 th:text="${post.title}">제목</h1>
<p class="meta">
    <span th:text="${post.author.name}">작성자</span>
    · <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
</p>
<pre th:text="${post.content}">내용</pre>

<div class="gallery" th:if="${post.images != null && !post.images.isEmpty()}">
    <div class="shot" th:each="img : ${post.images}">
        <p th:text="${img.originalName}">파일명</p>
        <img th:src="@{/uploads/{n}(n=${img.savedName})}" alt="원본" width="280"/>
        <img th:src="@{/uploads/{n}(n=${img.thumbnailSavedName})}" alt="썸네일" width="100"/>
    </div>
</div>
<p th:if="${post.images == null || post.images.isEmpty()}"
   style="color:#666;font-size:0.9rem;">첨부 이미지가 없습니다.</p>

<div class="actions" th:if="${canEdit}">
    <a th:href="@{/posts/{id}/edit(id=${post.id})}">수정</a>
    <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline; margin-left:0.75rem;">
        <button type="submit" onclick="return confirm('삭제할까요?');">삭제</button>
    </form>
</div>

</body>
</html>
