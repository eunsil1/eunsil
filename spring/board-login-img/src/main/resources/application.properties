spring.application.name=board-login-img
server.port=8082

# MySQL — 없으면 첫 연결 시 DB 생성 (수동 생성: CREATE DATABASE board_login_img CHARACTER SET utf8mb4;)
spring.datasource.url=jdbc:mysql://localhost:3306/board_login_img?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# 업로드 디렉터리 (WebConfig 에서 /uploads/** 로 노출)
app.upload-dir=${user.home}/board-login-img-uploads/