<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="|회원정보 — ${@environment.getProperty('app.pattern-label')}|">회원정보</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 520px; margin: 3rem auto; padding: 0 1rem; }
        h1 { font-size: 1.35rem; }
        .badge { font-size: 0.75rem; background: #eee; padding: 0.2rem 0.5rem; border-radius: 4px; }
        dl { margin-top: 1rem; }
        dt { font-weight: 600; margin-top: 0.5rem; }
        dd { margin: 0.25rem 0 0 0; }
        nav { margin-top: 1.5rem; }
        a { color: #06c; }
    </style>
</head>
<body>
<h1>회원정보 <span class="badge" th:text="${@environment.getProperty('app.pattern-label')}">Setter</span></h1>
<p>DTO로 변환된 값만 화면에 표시합니다 (비밀번호 제외).</p>
<dl>
    <dt>아이디</dt>
    <dd th:text="${userProfile.username}">-</dd>
    <dt>이름</dt>
    <dd th:text="${userProfile.name}">-</dd>
</dl>
<nav>
    <a th:href="@{/home}">홈</a>
    · <a th:href="@{/posts}">게시판</a>
    · <a th:href="@{/logout}">로그아웃</a>
</nav>
</body>
</html>
