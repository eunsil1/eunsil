<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 420px; margin: 3rem auto; padding: 0 1rem; }
        h1 { font-size: 1.35rem; }
        label { display: block; margin-top: 0.75rem; font-weight: 600; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
        .msg { color: #0a7; margin-bottom: 1rem; }
        .err { color: #c00; margin-bottom: 1rem; }
        nav { margin-top: 1rem; }
        a { color: #06c; }
    </style>

</head>
<body>
<h1>로그인</h1>
<p th:if="${param.registered}" class="mas">회원가입이 완료되었습니다.</p>
<!--?registered=true -->
<p th:if="${error}" class="err" th:text="${error}">오류</p>
<form th:action="@{/login}" method="post">
    <label for="username">아이디</label>
    <input type="text" id="username" name="username" th:value="${username}" autocomplete="username"/>
    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" autocomplete="current-password"/>
    <button type="submit">로그인</button>
</form>
    <a th:href="@{/register}">회원가입</a>
    · <a th:href="@{/posts}">게시판</a>
</body>
</html>
