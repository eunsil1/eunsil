services:
  mysql:
    image: mysql:8.4
    container_name: crud2-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crud2_db
      MYSQL_USER: crud2
      MYSQL_PASSWORD: crud2
    ports:
      - "3306:3306"
    volumes:
      - crud2-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  crud2:
    build: .
    image: crud2:latest
    container_name: crud2-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_USERNAME: crud2
      SPRING_DATASOURCE_PASSWORD: crud2

volumes:
  crud2-mysql-data:
