# 운영 / AWS RDS MySQL — SPRING_PROFILES_ACTIVE=prod 와 함께 사용
# 계정·비밀번호는 환경 변수로 주입 (docker run -e 또는 EC2)

spring.application.name=crud2

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://crud-db.cns2si0cmso8.ap-northeast-2.rds.amazonaws.com:3306/crud2_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crud2}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crud2}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=false

spring.thymeleaf.cache=true
