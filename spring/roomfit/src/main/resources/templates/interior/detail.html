<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${post.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <span class="badge bg-secondary" th:text="${post.style.label}"></span>
    <h2 th:text="${post.title}">제목</h2>
    <p class="text-muted">
        <span th:text="${post.author.nickname}"></span> ·
        조회 <span th:text="${post.viewCount}"></span> ·
        좋아요 <span th:text="${post.likeCount}"></span>
    </p>
    <img th:src="${post.thumbnailPath}" class="img-fluid rounded mb-3" alt="" th:alt="${post.title}"/>
    <div class="mb-4" style="white-space:pre-wrap" th:text="${post.content}"></div>
    <form th:action="@{/interior/{id}/like(id=${post.id})}" method="post" class="mb-4" sec:authorize="isAuthenticated()">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn btn-outline-danger" th:text="${liked} ? '좋아요 취소' : '좋아요'">좋아요</button>
    </form>
    <h4>댓글</h4>
    <ul class="list-group mb-3">
        <li class="list-group-item" th:each="c : ${comments}">
            <strong th:text="${c.author.nickname}"></strong>:
            <span th:text="${c.content}"></span>
            <small class="text-muted" th:if="${c.parent != null}"> (답글)</small>
        </li>
<!--        c.author.nickname 댓글 작성자-->
<!--        대댓글(답글)-->
    </ul>
    <form th:action="@{/interior/{id}/comment(id=${post.id})}" method="post" sec:authorize="isAuthenticated()">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <textarea name="content" class="form-control mb-2" required></textarea>
        <button class="btn btn-primary btn-sm">댓글 등록</button>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
