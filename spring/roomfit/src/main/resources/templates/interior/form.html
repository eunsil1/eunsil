<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('글쓰기')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container col-md-8">
    <h2>인테리어 글쓰기</h2>
    <form th:action="@{/interior/write}" th:object="${form}" method="post" enctype="multipart/form-data" class="card card-body">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <select th:field="*{style}" class="form-select mb-2">
            <option th:each="s : ${styles}" th:value="${s}" th:text="${s.label}"></option>
        </select>
        <input th:field="*{title}" class="form-control mb-2" placeholder="제목"/>
        <textarea th:field="*{content}" class="form-control mb-2" rows="6" placeholder="내용"></textarea>
        <input type="number" step="0.1" th:field="*{roomSize}" class="form-control mb-2" placeholder="평수"/>
        <input type="number" th:field="*{budget}" class="form-control mb-2" placeholder="예산(만원)"/>
        <div class="form-check mb-2">
            <input type="checkbox" th:field="*{hasFurnitureTag}" class="form-check-input" id="ft"/>
            <label for="ft" class="form-check-label">가구 있음</label>
        </div>
        <input type="file" name="image" accept="image/*" class="form-control mb-3"/>
        <button class="btn btn-primary">등록</button>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
