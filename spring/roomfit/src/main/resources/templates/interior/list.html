<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('인테리어 게시판')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>원룸 인테리어</h2>
        <a th:href="@{/interior/write}" class="btn btn-primary" sec:authorize="isAuthenticated()">글쓰기</a>
    </div>
    <div class="mb-3">
        <a th:href="@{/interior}" class="btn btn-sm btn-outline-secondary me-1">전체</a>
        <a th:each="s : ${styles}" th:href="@{/interior(style=${s})}"
           class="btn btn-sm me-1"
           th:classappend="${style == s} ? 'btn-primary' : 'btn-outline-secondary'"
           th:text="${s.label}">카테고리</a>
        <!--       ${styles} Interior.values() - 미니멀, 북유럽  -->
    </div>
    <div class="row">
<!--        Page<InteriorPost> - 현재 페이지 글목록-->
        <div class="col-md-4 mb-3" th:each="post : ${page.content}">
<!--           ${page.thumbnailPath} - getThumbnailPath() - 썸네일 url -->
            <div class="card card-interior h-100">
                <img th:src="${post.thumbnailPath}" class="card-img-top" alt="" th:alt="${post.title}"/>
                <div class="card-body">
                    <span class="badge bg-secondary" th:text="${post.style.label}"></span>
                    <h5 th:text="${post.title}">제목</h5>
                    <p class="small text-muted">조회 <span th:text="${post.viewCount}"></span> · 좋아요 <span th:text="${post.likeCount}"></span></p>
                    <a th:href="@{/interior/{id}(id=${post.id})}" class="btn btn-sm btn-outline-primary">보기</a>
<!--               @{/interior/{id}(id=${post.id})} 상세보기 연결하기 -->
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
