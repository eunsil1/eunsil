<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('관리자 - 상품')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">상품 관리</h2>
        <div>
            <a class="btn btn-outline-secondary me-1" th:href="@{/admin}">대시보드</a>
            <a class="btn btn-primary" th:href="@{/admin/products/new}">상품 등록</a>
        </div>
    </div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <form class="row g-2 mb-3" method="get" th:action="@{/admin/products}">
        <div class="col-auto flex-grow-1">
            <input type="search" name="keyword" class="form-control" placeholder="상품명 검색" th:value="${keyword}"/>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-secondary">검색</button>
        </div>
    </form>
    <table class="table table-bordered table-hover bg-white">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>이미지</th>
            <th>상품명</th>
            <th>스타일</th>
            <th>가격</th>
            <th>재고</th>
            <th>판매</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${page.content}">
<!--            상품 목록을 반복 -->
            <td th:text="${p.id}">1</td>
            <td style="width: 72px">
                <img th:src="${p.displayImagePath}" class="rounded border"
                     style="width:64px; height: 64px; object-fit: cover" alt=""/>
            </td>
            <td th:text="${p.name}">이름</td>
            <td th:text="${p.styleTag.label}">스타일</td>
            <td th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + '원'">0</td>
            <td th:text="${p.stock}">0</td>
            <td>
                <span class="badge bg-success" th:if="${p.onSale}">판매중</span>
                <span class="badge bg-secondary" th:unless="${p.onSale}">중지</span>
            </td>
            <td class="text-nowrap">
                <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/products/{id}/edit(id=${p.id})}">수정</a>
                <form class="d-inline" th:action="@{/admin/products/{id}/delete(id=${p.id})}" method="post"
                      th:if="${p.onSale}" onsubmit="return confirm('판매 중지할까요? 소품샵 목록에서 숨겨집니다.');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-danger">판매 중지</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${page.isEmpty()}" class="text-muted">상품이 없습니다.</p>
    <nav th:if="${page.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(page=${page.number - 1}, keyword=${keyword})}">이전</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="|${page.number + 1} / ${page.totalPages}|">1/1</span>
            </li>
            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(page=${page.number + 1}, keyword=${keyword})}">다음</a>
            </li>
        </ul>
    </nav>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
