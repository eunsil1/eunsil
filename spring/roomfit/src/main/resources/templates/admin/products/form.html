<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${editMode} ? '상품 수정' : '상품 등록')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container col-md-8">
    <h2 class="mb-3" th:text="${editMode} ? '상품 수정' : '상품 등록'">상품</h2>
    <form th:object="${form}" method="post" enctype="multipart/form-data"
          th:action="${editMode} ? @{/admin/products/{id}(id=${form.id})} : @{/admin/products}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
<!--        editMode false action= @{/admin/products} create-->
<!--        editMode true action= @{/admin/products/{id}(id=${form.id})} update -->

        <div class="mb-3">
            <label class="form-label">상품명</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">가격 (원)</label>
                <input type="number" class="form-control" th:field="*{price}" min="0" required/>
                <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">재고</label>
                <input type="number" class="form-control" th:field="*{stock}" min="0" required/>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">스타일 태그</label>
            <select class="form-select" th:field="*{styleTag}" required>
                <option th:each="s : ${styles}" th:value="${s}" th:text="${s.label}"></option>
            </select>
        </div>
        <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" th:field="*{onSale}" id="onSale"/>
            <label class="form-check-label" for="onSale">판매 중</label>
        </div>
        <div class="mb-3">
            <label class="form-label">상품 이미지</label>
            <input type="file" name="image" class="form-control" accept="image/*"/>
            <p class="form-text text-muted">선택 시 `roomfit-uploads/product/` 에 저장됩니다. 수정 시 미선택이면 기존 이미지를 유지합니다.</p>
        </div>
        <div class="mb-3" th:if="${editMode and product != null}">
            <label class="form-label">현재 이미지</label>
            <img th:src="${product.displayImagePath}" class="rounded border" style="max-height:160px" alt=""/>
        </div>
        <button type="submit" class="btn btn-primary" th:text="${editMode} ? '저장' : '등록'">
            저장
        </button>
        <a class="btn btn-ouline-secondary" th:href="@{/admin/products}">목록</a>

    </form>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
