<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('관리자')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h2 class="mb-4">관리자 대시보드</h2>
    <p class="mb-3">
        <a class="btn btn-primary" th:href="@{/admin/products}">소품 상품 관리</a>
    </p>
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-center p-3">
                <h3 th:text="${stats.memberCount}">0</h3><p>회원</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center p-3">
                <h3 th:text="${stats.interiorPostCount}">0</h3><p>인테리어 글</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center p-3">
                <h3 th:text="${stats.communityPostCount}">0</h3><p>커뮤니티 글</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center p-3">
                <h3 th:text="${stats.pendingReportCount}">0</h3><p>대기 신고</p>
            </div>
        </div>
    </div>
    <h4>신고 처리</h4>
    <table class="table">
        <tr th:each="r : ${reports}">
            <td th:text="${r.targetType} + '#' + ${r.targetId}"></td>
            <td th:text="${r.reason}"></td>
            <td>
                <form th:action="@{/admin/reports/{id}(id=${r.id})}" method="post" class="d-flex gap-1">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="status" value="PROCESSED"/>
                    <button class="btn btn-sm btn-success">처리</button>
                </form>
            </td>
        </tr>
    </table>
</div>
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
