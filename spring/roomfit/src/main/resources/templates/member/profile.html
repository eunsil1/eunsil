<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('추천 프로필')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container col-md-6">
    <h2>맞춤 추천 프로필</h2>
    <p class="text-muted">평수·예산·스타일을 입력하면 알고리즘이 인테리어를 추천합니다.</p>
    <form th:action="@{/member/profile}" th:object="${form}" method="post" class="card card-body">
        <div class="mb-3">
            <label class="form-label">원룸 평수</label>
            <input type="number" step="0.1" th:field="*{roomSize}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">예산 (만원)</label>
            <input type="number" th:field="*{budget}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">선호 스타일</label>
            <select th:field="*{preferredStyle}" class="form-select">
                <option th:each="s : ${T(com.example.roomfit.domain.InteriorStyle).values()}"
                        th:value="${s}" th:text="${s.label}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">생활패턴</label>
            <input th:field="*{lifestyle}" class="form-control" placeholder="재택, 야근, 운동 등"/>
        </div>
        <div class="form-check mb-3">
            <input type="checkbox" th:field="*{hasFurniture}" class="form-check-input" id="hf"/>
            <label class="form-check-label" for="hf">가구 보유</label>
        </div>
        <div class="mb-3">
            <label class="form-label">수면 패턴</label>
            <input th:field="*{sleepPattern}" class="form-control" placeholder="아침형/저녁형"/>
        </div>
        <button class="btn btn-primary w-100">저장 후 추천 받기</button>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
