<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('마이페이지')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h2 class="mb-4">마이페이지</h2>
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="card mb-3">
        <div class="card-body">
            <p>닉네임: <span sec:authentication="principal.nickname"></span></p>
            <p th:if="${profile}">
                추천 프로필: <span th:text="${profile.preferredStyle.label}"></span> /
                <span th:text="${profile.roomSize}"></span>평 /
                <span th:text="${profile.budget}"></span>만원
            </p>
            <p th:unless="${profile}" class="text-warning">추천 프로필이 없습니다.</p>
            <a th:href="@{/member/profile}" class="btn btn-outline-primary btn-sm">프로필 설정</a>
            <a th:href="@{/member/edit}" class="btn btn-outline-secondary btn-sm">회원정보 수정</a>
            <a th:href="@{/recommend/result}" class="btn btn-primary btn-sm">맞춤 추천</a>
        </div>
    </div>
    <form th:action="@{/member/withdraw}" method="post" onsubmit="return confirm('탈퇴하시겠습니까?');">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-danger btn-sm">회원 탈퇴</button>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
