<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('회원정보 수정')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container col-md-5">
    <h2>회원정보 수정</h2>
    <form th:action="@{/member/edit}" method="post" class="card card-body mt-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label class="form-label">닉네임</label>
        <input name="nickname" class="form-control mb-2" th:value="${member.nickname}" required/>
        <label class="form-label">연락처</label>
        <input name="phone" class="form-control mb-2" th:value="${member.phone}"/>
        <label class="form-label">성별</label>
        <select name="gender" class="form-select mb-3">
            <option th:each="g : ${genders}" th:value="${g}" th:text="${g}"
                    th:selected="${g == member.gender}"></option>
        </select>
        <button class="btn btn-primary">저장</button>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
