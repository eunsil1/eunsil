<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('비밀번호 찾기')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container col-md-5">
    <h2>비밀번호 재설정</h2>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form th:action="@{/member/find-pw}" method="post" class="card card-body mt-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input name="loginId" class="form-control mb-2" placeholder="아이디" required/>
        <input name="email" type="email" class="form-control mb-2" placeholder="이메일" required/>
        <input name="newPassword" type="password" class="form-control mb-2" placeholder="새 비밀번호" required/>
        <button class="btn btn-primary">변경</button>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
