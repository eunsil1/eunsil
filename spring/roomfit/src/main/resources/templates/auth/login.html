<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container col-md-5">
    <h2 class="mb-4">로그인</h2>
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <form th:action="@{/login}" method="post" class="card card-body shadow-sm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
            <label class="form-label">아이디</label>
            <input type="text" name="loginId" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">비밀번호</label>
            <input type="password" name="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>
    <p class="mt-3 text-center">
        <a th:href="@{/register}">회원가입</a> |
        <a th:href="@{/member/find-id}">아이디 찾기</a> |
        <a th:href="@{/member/find-pw}">비밀번호 찾기</a>
    </p>
    <p class="text-muted small">데모: user1 / user1234 · admin / admin1234</p>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
