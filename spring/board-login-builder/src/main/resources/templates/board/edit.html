<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>수정 — board-login</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.35rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; }
    input[type="text"] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
    textarea { width: 100%; min-height: 220px; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; font-family: inherit; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    .field-err { color: #a00; font-size: 0.85rem; margin-top: 0.2rem; }
    .err { color: #c00; margin-bottom: 0.75rem; }
    .nav { margin-bottom: 1rem; }
    a { color: #06c; }
  </style>
</head>
<body>
<div class="nav">
  <a th:href="@{/posts/{id}(id=${postId})}">글 보기</a>
  · <a th:href="@{/posts}">목록</a>
</div>
<h1>글 수정</h1>
<p th:if="${error}" class="err" th:text="${error}"></p>
<form th:action="@{/posts/{id}/edit(id=${postId})}" th:object="${form}" method="post">
  <label for="title">제목</label>
  <input type="text" id="title" th:field="*{title}" maxlength="200"/>
  <p class="field-err" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
  <label for="content">내용</label>
  <textarea id="content" th:field="*{content}"></textarea>
  <p class="field-err" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
  <button type="submit">저장</button>
</form>
</body>
</html>
