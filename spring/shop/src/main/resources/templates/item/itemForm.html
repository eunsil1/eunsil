<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout=http://www.ultraq.net.nz/thymeleaf/layout
      layout:decorate="~{layouts/layout1}">
<!--사용자 스크립트 추가-->
<th:block layout:fragment="script">
    <script th:inline="javascript">
        $(function (){
            var errorMessage = [[${errorMessage}]];
            if(errorMessage != null){
                alert(errorMessage);
            }
            bindDomEvent();
        });

        function bindDomEvent(){
            $(".custom-file-input").on("change", function (){ //파일선택
                var fileName = $(this).val().split("\\").pop(); //이미지 파일명
                //c:/path/macbook.jpg ["c:","path","macbook.jpg"] - macbook.jpg - pop() 마지막 요소 꺼낸다.
                var fileExt = fileName.substring(fileName.lastIndexOf(".")+1); //확장자 추출
                fileExt = fileExt.toLowerCase(); //소문자 변환

                //macbook.exe
                if(fileExt != "jpg" && fileExt != "jpeg" && fileExt != "gif" && fileExt != "png" && fileExt != "bmp"){
                    alert("이미지 파일만 등록이 가능합니다.");
                    return;
                }
                $(this).siblings(".custom-file-label").html(fileName);
            });
        }

    </script>
</th:block>
<!-- 사용자 CSS 추가 -->
<th:block layout:fragment="css">
    <style>
        .input-group {
            margin-bottom : 15px
        }
        .img-div {
            margin-bottom : 10px
        }
        .fieldError {
            color: #bd2130;
        }
    </style>
</th:block>
<div layout:fragment="content">
    <form th:action="@{/admin/item/new}" role="form" method="post" enctype="multipart/form-data" th:object="${itemFormDto}">
        <p class="h2">상품등록</p>
        <input type="hidden" th:field="*{id}">
        <div class="form-group">
            <select th:field="*{itemSellStatus}" class="custom-select">
                <option value="SELL">판매중</option>
                <option value="SOLD_OUT">품절</option>
            </select>
        </div>
        <div class="input-group">
            <div class="input-group-prepend">
                <span class="input-group-text">상품명</span>
            </div>
            <input type="text" th:field="*{itemNm}" class="form-control" placeholder="상품명을 입력하세요">
        </div>
        <p th:if="${#fields.hasErrors('itemNm')}" th:errors="*{itemNm}" class="fieldError">Incorrect data</p>

        <div class="input-group">
            <div class="input-group-prepend">
                <span class="input-group-text">가격</span>
            </div>
            <input type="number" th:field="*{price}" class="form-control" placeholder="상품의 가격을 입력하세요">
        </div>
        <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="fieldError">Incorrect data</p>

        <div class="input-group">
            <div class="input-group-prepend">
                <span class="input-group-text">재고</span>
            </div>
            <input type="number" th:field="*{stockNumber}" class="form-control" placeholder="상품의 재고를 입력하세요">
        </div>
        <p th:if="${#fields.hasErrors('stockNumber')}" th:errors="*{stockNumber}" class="fieldError">Incorrect data</p>

        <div class="input-group">
            <div class="input-group-prepend">
                <span class="input-group-text">상세내용</span>
            </div>
            <textarea class="form-control" aria-label="With textarea" th:field="*{itemDetail}"></textarea>
        </div>
        <p th:if="${#fields.hasErrors('itemDetail')}" th:errors="*{itemDetail}" class="fieldError">Incorrect data</p>

<!-- itemFormDto.itemImgDtoList 비어있을때 아래 내용출력   -->
        <div th:if="${#lists.isEmpty(itemFormDto.itemImgDtoList)}">
            <div class="form-group" th:each="num :${#numbers.sequence(1,5)}">
<!--                1,2,3,4,5 -->
                <div class="custom-file img-div">
                    <input type="file" class="custom-file-input" name="itemImgFile">
                    <label class="custom-file-label" th:text="'상품이미지' + ${num}"></label>
<!--                    상품이미지1, 상품이미지2, 상품이미지3, 상품이미지4, 상품이미지5-->
                </div>
            </div>
        </div>

<!--        수정화면 -->
<!--        이미 등록된 이미지가 있는 경우(즉 수정페이지)에만 Html 블록이 나온다 -->
        <div th:if="${not #lists.isEmpty(itemFormDto.itemImgDtoList)}">
<!--           등록된 이미지 갯수만큼 반복해서 입력창을 만든다  -->
            <div class="form-group" th:each="itemImgDto, status : ${itemFormDto.itemImgDtoList}">

                <div class="custom-file img-div">
                    <input type="file" class="custom-file-input" name="itemImgFile">
                    <input type="hidden" name="itemImgIds" th:value="${itemImgDto.id}">
                    <label class="custom-file-label" th:text="${not #strings.isEmpty(itemImgDto.oriImgName)}
                    ? ${itemImgDto.oriImgName}
                    : '상품이미지' + ${status.index+1}"></label>
<!--                {not #strings.isEmpty(itemImgDto.oriImgName)} 기존파일이 비어있지 않은가?-->
<!--                참일때 ${itemImgDto.oriImgName} 기존에 등록됐던 실제 파일명 표시-->
<!--                거짓일때 상품이미지1, 상품이미지2  -->
                </div>
            </div>
        </div>

<!--        itemFormDto.id 비어있으면 새상품 등록-->
        <div th:if="${#strings.isEmpty(itemFormDto.id)}" style="text-align: center">
            <button th:formaction="@{/admin/item/new}" type="submit" class="btn btn-primary">저장</button>
        </div>

<!--        itemFormDto.id 비어있지 않으면 기존 상품 편집 -->
        <div th:unless="${#strings.isEmpty(itemFormDto.id)}" style="text-align: center">
            <button th:formaction="@{'/admin/item/'+${itemFormDto.id}}" type="submit" class="btn btn-primary">수정</button>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>

</div>
