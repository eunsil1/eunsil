<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<div th:fragment="header">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Shop</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse"
                data-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto mb-2 mb-lg-0">
                <li class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN')">
                    <a class="nav-link active" href="/admin/item/new">상품등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN')">
                    <a class="nav-link" href="/admin/items">상품관리</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/cart">장바구니</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/orders">구매이력</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" href="/members/login">로그인</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/members/logout">로그아웃</a>
                </li>
            </ul>
<!--        hasAnyAuthority('ROLE_ADMIN') 관리자 상품등록 상품관리    -->
<!--        isAuthenticated() 로그인한 사람 장바구니,구매이력,로그아웃   -->
<!--        isAnonymous() 로그인 안한 사용자 로그인만 보임   -->
            <form class="form-inline my-2 my-lg-0" th:action="@{/}" method="get">
                <input name="searchQuery" class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
            </form>
<!--            @{/} 검색버튼을 누르면 메인페이지(/) 다시 이동 후 메인 컨트롤러가 서버의 ItemSearchDto 내에
                있는 searchQuery 필드와 이름이 같아야 스프링 값을 바인딩-->
<!--            /searchQuery=셔츠 name="searchQuery" MainController의 main(itemSearchDto itemSearchDto) 의
                Spring의 itemSearchDto의 searchQuery 필드에 자동 바인딩 -->
<!--            즉, 헤더에서 검색하면 홈(상품 목록) 이 다시 열리면서, 그때 넘긴 문자열로 목록이 필터링되는 흐름입니다. MainController는 ItemSearchDto와 page를 받아 getMainItemPage를 호출합니다.-->
        </div>
    </div>
</nav>
</div>
</html>
