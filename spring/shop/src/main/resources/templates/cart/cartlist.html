<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout1}">
<head>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        $(function (){
            $("input[name=cartChkBox]").change(function(){
               getOrderTotalPrice();
            });
        });

        function getOrderTotalPrice(){
            var orderTotalPrice = 0;
            $("input[name=cartChkBox]:checked").each(function(){
                var cartItemId = $(this).val();
                var price = $("#price_" + cartItemId).attr("data-price");
                var count = $("#count_" + cartItemId).val();
                orderTotalPrice += price * count;
            });
            $("#orderTotalPrice").html(orderTotalPrice + "원");
        }

        function changeCount(obj){
            var count = obj.value;
            var cartItemId = obj.id.split('_')[1];
            var price = $("#price_" + cartItemId).data("price");//이부분 수정
            var totalPrice = count * price;
            $("#totalPrice_"+ cartItemId).html(totalPrice+"원");
            getOrderTotalPrice();

            updateCartItemCount(cartItemId, count);
        }

        function checkAll(){
            if($("#checkall").prop("checked")){
                $("input[name=cartChkBox]").prop("checked",true);
            }else{
                $("input[name=cartChkBox]").prop("checked",false);
            }
            getOrderTotalPrice();
        }


        function updateCartItemCount(cartItemId, count) {
            var header = $("meta[name='_csrf_header']").attr("content");
            var token = $("meta[name='_csrf']").attr("content");
            //csrf 토큰 획득 <head>에 설정했던 메타태그에서 토큰갑소가 헤더 이름을 가져옴
            //이정보가 없으면 스프링 시큐리티가 POST 요청 거절

            var url = "/cartItem/"+cartItemId+"?count="+count;

            $.ajax({
                url: url,
                type: "PATCH",
                beforeSend: function (xhr) {
                    //데이터 전송하기 전에 헤더에 csrf값 설정
                    xhr.setRequestHeader(header, token)
                },
                dataType: "json",
                cache: false,
                success: function (result, status) {
                    console.log("cartItem count update success");
                },
                error: function (jqXHR, status, error) {
                    if (jqXHR.status == '401') {
                        alert('로그인 후 이용해주세요');
                        location.href = '/members/login';
                    } else {
                        alert(jqXHR.responseText);
                    }
                }
            });
        }

        function orders() {
            var header = $("meta[name='_csrf_header']").attr("content");
            var token = $("meta[name='_csrf']").attr("content");

            var url = "/cart/orders";
            var dataList = new Array(); //체크된 장바구니 상품들을 담을 객체
            var paramData = new Object();

            $("input[name=cartChkBox]:checked").each(function(){ //체크된 상품 찾기
                var cartItemId = $(this).val(); //3 5 8 - 상품번호
                var data = new Object();
                data["cartItemId"] = cartItemId; //cartItemId 저장
                // {
                //"cartItemId": 3
                // }
                dataList.push(data); //

            });
            // [
            //     {"cartItemId":3},
            //     {"cartItemId":5},
            //     {"cartItemId":8}
            // ]
            paramData['cartOrderDtoList'] = dataList;
            var param = JSON.stringify(paramData); //JSON 데이터를 반환(직렬화)
            $.ajax({
                url: url,
                type: "POST",
                contentType: "application/json",
                data: param,
                beforeSend: function (xhr) {
                    //데이터 전송하기 전에 헤더에 csrf값 설정
                    xhr.setRequestHeader(header, token)
                },
                dataType: "json",
                cache: false,
                success: function (result, status) {
                    alert("주문이 완료되었습니다.");
                    location.href = '/orders';
                },
                error: function (jqXHR, status, error) {
                    if (jqXHR.status == '401') {
                        alert('로그인 후 이용해주세요');
                        location.href = '/members/login';
                    } else {
                        alert(jqXHR.responseJSON.message);
                    }
                }
            });

        }

        //obj(삭제 버튼 자산 - dom 객체)
        //deleteCartItem(this) - 호출될때 클릭한 html 요소
        function deleteCartItem(obj) {
            var cartItemId = obj.dataset.id; //data-id = "3"
            var header = $("meta[name='_csrf_header']").attr("content");
            var token = $("meta[name='_csrf']").attr("content");
            //csrf 토큰 획득 <head>에 설정했던 메타태그에서 토큰갑소가 헤더 이름을 가져옴
            //이정보가 없으면 스프링 시큐리티가 POST 요청 거절

            var url = "/cartItem/"+cartItemId;

            $.ajax({
                url: url,
                type: "DELETE",
                beforeSend: function (xhr) {
                    //데이터 전송하기 전에 헤더에 csrf값 설정
                    xhr.setRequestHeader(header, token)
                },
                dataType: "json",
                cache: false,
                success: function (result, status) {
                    var cartItemId = result;
                    $("#cartItem_" + cartItemId).closest("tr").remove();
                    getOrderTotalPrice();
                },
                error: function (jqXHR, status, error) {
                    if (jqXHR.status == '401') {
                        alert('로그인 후 이용해주세요');
                        location.href = '/members/login';
                    } else {
                        alert(jqXHR.responseText);
                    }
                }
            });
        }
    </script>
</th:block>

<!-- 사용자 CSS 추가 -->
<th:block layout:fragment="css">
    <style>
        .content-mg{
            margin-left:25%;
            margin-right:25%;
            margin-top:2%;
            margin-bottom:100px;
        }
        .repImgDiv{
            margin-right:15px;
            margin-left:15px;
            height:auto;
        }
        .repImg{
            height:100px;
            width:100px;
        }
        .fs18{
            font-size:18px
        }
        .fs24{
            font-size:24px
        }
    </style>
</th:block>

<div layout:fragment="content" class="content-mg">
    <h2 class="mb-4">
        장바구니 목록
    </h2>
    <table class="table">
        <colgroup>
            <col width="15%"/>
            <col width="70%"/>
            <col width="15%"/>
        </colgroup>
        <thead>
        <tr class="text-center">
            <td>
                <input type="checkbox" id="checkall" onclick="checkAll()">전체선택
            </td>
            <td>상품정보</td>
            <td>상품금액</td>
        </tr>
        </thead>
        <tbody>
            <tr th:each="cartItem : ${cartItems}">
                <td class="text-center align-middle">
                    <input type="checkbox" name="cartChkBox" th:value="${cartItem.cartItemId}">
                </td>
                <td class="d-flex">
                    <div class="repImgDiv align-self-center">
                        <img th:src="${cartItem.imgUrl}" class="rounded repImg" th:alt="cartItem.itemNm">
                    </div>
                    <div class="align-self-center">
                        <span th:text="${cartItem.itemNm}" class="fs24 font-weight-bold"></span>
                        <div class="fs18 font-weight-light">
                            <span class="input-group mt-2">
                                <span th:id="'price_' + ${cartItem.cartItemId}"
                                      th:data-price="${cartItem.price}"
                                      th:text="${cartItem.price} + '원'" class="align-self-center mr-2">
                                </span>
                                <input type="number" name="count" th:id="'count_' + ${cartItem.cartItemId}"
                                       th:value="${cartItem.count}" min="1"
                                       onchange="changeCount(this)" class="form-control mr-2">
                                <button type="button" class="close" aria-label="Close">
                                    <span aria-hidden="true" th:data-id="${cartItem.cartItemId}"
                                          onclick="deleteCartItem(this)">&times;</span>
                                </button>
                            </span>
                        </div>
                    </div>
                </td>
                <td class="text-center align-middle">
                    <span th:id="'totalPrice_' + ${cartItem.cartItemId}"
                          name="totalPrice" th:text="${cartItem.price * cartItem.count} + '원'">
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
    <h2 class="text-center">
        총 주문 금액 : <span id="orderTotalPrice" class="text-danger">0원</span>
    </h2>
    <div class="text-center mt-3">
        <button type="button" class="btn btn-primary btn-lg" onclick="orders()">주문하기</button>
    </div>
</div>
</html>
