<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 420px; margin: 3rem auto; padding: 0 1rem; }
        h1 { font-size: 1.35rem; }
        label { display: block; margin-top: 0.75rem; font-weight: 600; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
        .err { color: #c00; margin-bottom: 1rem; }
        .field-err { color: #a00; font-size: 0.85rem; margin-top: 0.2rem; }
        nav { margin-top: 1rem; }
        a { color: #06c; }
    </style>

</head>
<body>
<h1>회원가입</h1>
<p th:if="${error}" class="err" th:text="${error}">오류</p>
<form th:action="@{/register}" method="post" th:object="${form}">
    <label for="username">아이디</label>
    <input type="text" id="username" th:field="*{username}" autocomplete="username"/>
    <p class="field-err" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
    <label for="password">비밀번호</label>
    <input type="password" id="password" th:field="*{password}" autocomplete="new-password"/>
    <p class="field-err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
    <label for="passwordConfirm">비밀번호 확인</label>
    <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" autocomplete="new-password"/>
    <p class="field-err" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></p>
    <label for="name">이름</label>
    <input type="text" id="name" th:field="*{name}" autocomplete="name"/>
    <p class="field-err" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
    <button type="submit">가입하기</button>
</form>
<nav>
    <a th:href="@{/login}">로그인으로</a>
    · <a th:href="@{/posts}">게시판</a>
</nav>
</body>
</html>
