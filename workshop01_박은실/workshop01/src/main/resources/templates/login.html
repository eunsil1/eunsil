<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>로그인 — board-login-img-security-Oauth</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 420px; margin: 3rem auto; padding: 0 1rem; }
        h1 { font-size: 1.35rem; }
        label { display: block; margin-top: 0.75rem; font-weight: 600; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; width: 100%; }
        .msg { color: #0a7; margin-bottom: 1rem; }
        .err { color: #c00; margin-bottom: 1rem; }
        nav { margin-top: 1rem; }
        a { color: #06c; text-decoration: none; }
        .social { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #ddd; }
        .social p { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 0.75rem; }
        .social a {
            display: block; text-align: center; padding: 0.5rem; margin-bottom: 0.5rem;
            border: 1px solid #ccc; border-radius: 4px; color: #333;
        }
        .social a:hover { background: #f5f5f5; }
    </style>
</head>
<body>
<h1>로그인</h1>
<p th:if="${param.registered}" class="msg">회원가입이 완료되었습니다. 로그인해 주세요.</p>
<p th:if="${param.error}" class="err">아이디 또는 비밀번호가 올바르지 않습니다.</p>
<form th:action="@{/login}" method="post">
    <label for="username">아이디</label>
    <input type="text" id="username" name="username" autocomplete="username"/>
    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" autocomplete="current-password"/>
    <button type="submit">로그인</button>
</form>
<div class="social">
    <p>소셜 로그인</p>
    <a th:href="@{/oauth2/authorization/google}">Google로 로그인</a>
    <a th:href="@{/oauth2/authorization/naver}">네이버로 로그인</a>
    <a th:href="@{/oauth2/authorization/kakao}">카카오로 로그인</a>
</div>
<nav>
    <a th:href="@{/register}">회원가입</a>
    · <a th:href="@{/posts}">게시판</a>
</nav>
</body>
</html>
