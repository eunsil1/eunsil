 <!DOCTYPE html>
  <html>
  
  <head>
    <meta charset="utf-8">
    <title>지도 생성하기</title>
  
  </head>
  
  <body>
    <!-- 지도를 표시할 div 입니다 -->
    <div id="map" style="width:100%;height:350px;"></div>
  
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e04fcffdbc97a1c4f812f2ded69a2258"></script>
    <script> 
      // var mapContainer = document.getElementById('map'), // 지도를 표시할 div 
      //   mapOption = {
      //     center: new kakao.maps.LatLng(37.485997, 126.897464), // 지도의 중심좌표
      //     level: 3 // 지도의 확대 레벨
      //   };
      // 구글 지도에서 찾고싶은 주소 예를 들어 서울특별시 구로구 182-13 검색 -> 
      // 오른쪽 마우스 버튼 - 이 위치 공유 - 37.485997, 126.897464  위,경도 복사

      // 지도를 표시할 div와  지도 옵션으로  지도를 생성합니다
      // var map = new kakao.maps.Map(mapContainer, mapOption); 

    var mapContainer = document.getElementById('map'), // 지도를 표시할 div 
        mapOption = {
          center: new kakao.maps.LatLng(37.485997, 126.897464), // 지도의 중심좌표
          level: 3 // 지도의 확대 레벨
        };

      var map = new kakao.maps.Map(mapContainer, mapOption);

      // 마커가 표시될 위치입니다 
      var markerPosition = new kakao.maps.LatLng(37.485997, 126.897464);

      // 마커를 생성합니다
      var marker = new kakao.maps.Marker({
        position: markerPosition
      });

      // 마커가 지도 위에 표시되도록 설정합니다
      marker.setMap(map);

      var iwContent = '<div style="padding:5px;">메가커피 <br><a href="https://map.kakao.com/link/map/Hello World!,37.485997, 126.897464 " style="color:blue" target="_blank">큰지도보기</a> <a href="https://map.kakao.com/link/to/Hello World!,37.485997, 126.897464 " style="color:blue" target="_blank">길찾기</a></div>', // 인포윈도우에 표출될 내용으로 HTML 문자열이나 document element가 가능합니다
        iwPosition = new kakao.maps.LatLng(33.450701, 126.570667); //인포윈도우 표시 위치입니다

      // 인포윈도우를 생성합니다
      var infowindow = new kakao.maps.InfoWindow({
        position: iwPosition,
        content: iwContent
      });

      // 마커 위에 인포윈도우를 표시합니다. 두번째 파라미터인 marker를 넣어주지 않으면 지도 위에 표시됩니다
      infowindow.open(map, marker); 
    </script>
  </body>
  
  </html>
